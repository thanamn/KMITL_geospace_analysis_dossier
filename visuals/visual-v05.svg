<text class="headerTitle" x="34" y="48">Why GIS Is the Safety Net</text>
<text class="headerSub" x="34" y="69">Pure hardware versus GIS and data</text><rect x="70" y="152" width="485" height="420" rx="18" ry="18" fill="#fbeceb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="70" y="152" width="485" height="10" rx="18" ry="18" fill="#b85b55"/><text x="88" y="194" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="88" dy="0">Pure hardware path</tspan></text><rect x="645" y="152" width="485" height="420" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="645" y="152" width="485" height="10" rx="18" ry="18" fill="#2f7a57"/><text x="663" y="194" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="663" dy="0">GIS / data path</tspan></text><text x="110" y="292" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Employer count</text><rect x="375" y="274" width="122" height="32" rx="16.0" ry="16.0" fill="#fbeceb"/><text x="436.0" y="296.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2f3d" text-anchor="middle">Low</text><text x="685" y="292" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Employer count</text><rect x="948" y="274" width="122" height="32" rx="16.0" ry="16.0" fill="#eaf5ef"/><text x="1009.0" y="296.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2f3d" text-anchor="middle">High</text><text x="110" y="360" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Capex</text><rect x="375" y="342" width="122" height="32" rx="16.0" ry="16.0" fill="#f8f1dd"/><text x="436.0" y="364.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2f3d" text-anchor="middle">High</text><text x="685" y="360" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Capex</text><rect x="948" y="342" width="122" height="32" rx="16.0" ry="16.0" fill="#eaf5ef"/><text x="1009.0" y="364.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2f3d" text-anchor="middle">Lower</text><text x="110" y="428" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Time to value</text><rect x="375" y="410" width="122" height="32" rx="16.0" ry="16.0" fill="#f8f1dd"/><text x="436.0" y="432.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2f3d" text-anchor="middle">Slow</text><text x="685" y="428" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Time to value</text><rect x="948" y="410" width="122" height="32" rx="16.0" ry="16.0" fill="#eaf5ef"/><text x="1009.0" y="432.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2f3d" text-anchor="middle">Fast</text><text x="110" y="496" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Fallback mobility</text><rect x="375" y="478" width="122" height="32" rx="16.0" ry="16.0" fill="#fbeceb"/><text x="436.0" y="500.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2f3d" text-anchor="middle">Narrow</text><text x="685" y="496" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Fallback mobility</text><rect x="948" y="478" width="122" height="32" rx="16.0" ry="16.0" fill="#eaf5ef"/><text x="1009.0" y="500.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#1f2f3d" text-anchor="middle">Wide</text><rect x="70" y="622" width="1060" height="68" rx="16" ry="16" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2"/><text x="94" y="649" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="94" dy="0">Core message: the geospatial layer is the employability buffer. It creates more immediate Thai demand and</tspan><tspan x="94" dy="24.3">better fallback mobility than a pure hardware-first read of the degree.</tspan></text></svg>
