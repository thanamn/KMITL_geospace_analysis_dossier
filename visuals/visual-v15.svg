<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Hardware Workload Matrix">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">Hardware Workload Matrix</text>
<text class="headerSub" x="34" y="69">Physical strain versus mental intensity</text><rect x="160" y="170" width="420" height="420" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><line x1="265.0" y1="170" x2="265.0" y2="590" stroke="#d8e0e8" stroke-width="2" stroke-linecap="round"/><line x1="160" y1="275.0" x2="580" y2="275.0" stroke="#d8e0e8" stroke-width="2" stroke-linecap="round"/><line x1="370.0" y1="170" x2="370.0" y2="590" stroke="#d8e0e8" stroke-width="2" stroke-linecap="round"/><line x1="160" y1="380.0" x2="580" y2="380.0" stroke="#d8e0e8" stroke-width="2" stroke-linecap="round"/><line x1="475.0" y1="170" x2="475.0" y2="590" stroke="#d8e0e8" stroke-width="2" stroke-linecap="round"/><line x1="160" y1="485.0" x2="580" y2="485.0" stroke="#d8e0e8" stroke-width="2" stroke-linecap="round"/><text x="370.0" y="634" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="middle">Physical strain</text><text x="70" y="380.0" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="middle">Mental intensity</text><circle cx="328.0" cy="270.8" r="24" fill="#7fa5c3" stroke="#ffffff" stroke-width="4"/><text x="366.0" y="278.8" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="366.0" dy="0">RF lab</tspan></text><circle cx="386.8" cy="304.4" r="24" fill="#2f7a57" stroke="#ffffff" stroke-width="4"/><text x="424.8" y="312.4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="424.8" dy="0">Teleport</tspan><tspan x="424.8" dy="24.3">operations</tspan></text><circle cx="260.8" cy="254.0" r="24" fill="#6c63a7" stroke="#ffffff" stroke-width="4"/><text x="298.8" y="262.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="298.8" dy="0">Embedded bench</tspan><tspan x="298.8" dy="24.3">work</tspan></text><circle cx="462.4" cy="279.2" r="24" fill="#c77b33" stroke="#ffffff" stroke-width="4"/><text x="500.4" y="287.2" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="500.4" dy="0">Clean-room AIT</tspan></text><rect x="650" y="182" width="420" height="364" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2"/><text x="674" y="222" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start">How to read it</text><text x="674" y="258" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="674" dy="0">The matrix fights a common</tspan><tspan x="674" dy="24.3">misconception: technical prestige does</tspan><tspan x="674" dy="24.3">not map neatly to one kind of</tspan><tspan x="674" dy="24.3">workload. Clean-room AIT is physically</tspan><tspan x="674" dy="24.3">stricter than embedded bench work,</tspan><tspan x="674" dy="24.3">while embedded or RF work can be</tspan><tspan x="674" dy="24.3">mentally more sustained. Choose the</tspan><tspan x="674" dy="24.3">path that matches your real working</tspan><tspan x="674" dy="24.3">style, not the aura around it.</tspan></text></svg>
