<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="How Overload Becomes Delay">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">How Overload Becomes Delay</text>
<text class="headerSub" x="34" y="69">Academic pressure as a cumulative system</text><rect x="110" y="156" width="360" height="106" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="110" y="156" width="360" height="10" rx="18" ry="18" fill="#b85b55"/><text x="128" y="198" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="128" dy="0">Heavy coursework</tspan></text><text x="128" y="230.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="128" dy="0">Math, labs, projects, and</tspan><tspan x="128" dy="18.9">deadlines pile up.</tspan></text><line x1="470" y1="210" x2="240" y2="284" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="240" y="230" width="360" height="106" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="240" y="230" width="360" height="10" rx="18" ry="18" fill="#b85b55"/><text x="258" y="272" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="258" dy="0">Missed milestone</tspan></text><text x="258" y="304.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="258" dy="0">One report, practical, or team</tspan><tspan x="258" dy="18.9">checkpoint slips.</tspan></text><line x1="600" y1="284" x2="370" y2="358" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="370" y="304" width="360" height="106" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="370" y="304" width="360" height="10" rx="18" ry="18" fill="#b85b55"/><text x="388" y="346" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="388" dy="0">Weak grades / incomplete</tspan><tspan x="388" dy="26.4">project</tspan></text><text x="388" y="404.4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="388" dy="0">The first miss spreads into</tspan><tspan x="388" dy="18.9">multiple courses.</tspan></text><line x1="730" y1="358" x2="500" y2="432" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="500" y="378" width="360" height="106" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="500" y="378" width="360" height="10" rx="18" ry="18" fill="#b85b55"/><text x="518" y="420" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="518" dy="0">Registration / fee / status</tspan><tspan x="518" dy="26.4">issue</tspan></text><text x="518" y="478.4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="518" dy="0">Administrative friction begins to</tspan><tspan x="518" dy="18.9">matter.</tspan></text><line x1="860" y1="432" x2="630" y2="506" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="630" y="452" width="360" height="106" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="630" y="452" width="360" height="10" rx="18" ry="18" fill="#b85b55"/><text x="648" y="494" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="648" dy="0">Leave / paperwork</tspan></text><text x="648" y="526.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="648" dy="0">Formal status management replaces</tspan><tspan x="648" dy="18.9">ordinary studying.</tspan></text><line x1="990" y1="506" x2="760" y2="580" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="760" y="526" width="360" height="106" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="760" y="526" width="360" height="10" rx="18" ry="18" fill="#b85b55"/><text x="778" y="568" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="778" dy="0">Longer graduation timeline</tspan></text><text x="778" y="600.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="778" dy="0">Delay compounds into cost, morale,</tspan><tspan x="778" dy="18.9">and opportunity loss.</tspan></text><rect x="116" y="646" width="964" height="60" rx="16" ry="16" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2"/><text x="140" y="674" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="140" dy="0">Why this visual matters: Chapter 5&#x27;s risk is usually cumulative drift, not one dramatic collapse. Early</tspan><tspan x="140" dy="24.3">intervention changes the whole chain.</tspan></text></svg>
