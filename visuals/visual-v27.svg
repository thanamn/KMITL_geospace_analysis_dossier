<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Go / No-Go Decision Matrix">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">Go / No-Go Decision Matrix</text>
<text class="headerSub" x="34" y="69">The final blunt recommendation</text><rect x="64" y="152" width="500" height="470" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="64" y="152" width="500" height="10" rx="18" ry="18" fill="#2f7a57"/><text x="82" y="194" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="82" dy="0">Go</tspan></text><rect x="636" y="152" width="500" height="470" rx="18" ry="18" fill="#fbeceb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="636" y="152" width="500" height="10" rx="18" ry="18" fill="#b85b55"/><text x="654" y="194" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="654" dy="0">No-Go</tspan></text><circle cx="100" cy="252" r="12" fill="#2f7a57" stroke="#ffffff" stroke-width="3"/><text x="126" y="260" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="126" dy="0">Technically serious</tspan></text><circle cx="100" cy="318" r="12" fill="#2f7a57" stroke="#ffffff" stroke-width="3"/><text x="126" y="326" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="126" dy="0">Comfortable with math, coding, and</tspan><tspan x="126" dy="24.3">abstraction</tspan></text><circle cx="100" cy="384" r="12" fill="#2f7a57" stroke="#ffffff" stroke-width="3"/><text x="126" y="392" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="126" dy="0">Willing to build a portfolio</tspan></text><circle cx="100" cy="450" r="12" fill="#2f7a57" stroke="#ffffff" stroke-width="3"/><text x="126" y="458" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="126" dy="0">Market-realistic about Thai demand</tspan></text><circle cx="100" cy="516" r="12" fill="#2f7a57" stroke="#ffffff" stroke-width="3"/><text x="126" y="524" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="126" dy="0">Okay with KMITL and Lat Krabang</tspan><tspan x="126" dy="24.3">trade-offs</tspan></text><circle cx="672" cy="252" r="12" fill="#b85b55" stroke="#ffffff" stroke-width="3"/><text x="698" y="260" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="698" dy="0">Main motive is prestige or vague</tspan><tspan x="698" dy="24.3">space romance</tspan></text><circle cx="672" cy="318" r="12" fill="#b85b55" stroke="#ffffff" stroke-width="3"/><text x="698" y="326" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="698" dy="0">Wants automatic employer</tspan><tspan x="698" dy="24.3">recognition</tspan></text><circle cx="672" cy="384" r="12" fill="#b85b55" stroke="#ffffff" stroke-width="3"/><text x="698" y="392" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="698" dy="0">Dislikes math, coding, and systems</tspan><tspan x="698" dy="24.3">thinking</tspan></text><circle cx="672" cy="450" r="12" fill="#b85b55" stroke="#ffffff" stroke-width="3"/><text x="698" y="458" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="698" dy="0">Needs a guaranteed hardware boom</tspan></text><circle cx="672" cy="516" r="12" fill="#b85b55" stroke="#ffffff" stroke-width="3"/><text x="698" y="524" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="698" dy="0">Will stay passive and wait for the</tspan><tspan x="698" dy="24.3">title to explain itself</tspan></text><rect x="142" y="648" width="916" height="58" rx="16" ry="16" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="166" y="674" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="166" dy="0">Bottom line: this degree is a conditional go for a portfolio-driven student and a no-go for</tspan><tspan x="166" dy="24.3">someone hoping the word space will do the work for them.</tspan></text></svg>
