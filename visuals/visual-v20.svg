<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Entry-Level Accessibility by Path">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">Entry-Level Accessibility by Path</text>
<text class="headerSub" x="34" y="69">Where fresh graduates can actually enter</text><text x="280" y="146" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#5f7385" text-anchor="start">Lower entry friction</text><text x="1040" y="146" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#5f7385" text-anchor="end">Higher entry friction</text><text x="78" y="200" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">GIS &amp; implementation roles</text><rect x="280" y="170" width="760" height="30" rx="12" ry="12" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="280" y="170" width="668.8" height="30" rx="12" ry="12" fill="#2f7a57" stroke="#2f7a57" stroke-width="2"/><text x="964.8" y="192" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">88</text><text x="78" y="286" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Consulting</text><rect x="280" y="256" width="760" height="30" rx="12" ry="12" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="280" y="256" width="562.4" height="30" rx="12" ry="12" fill="#7fa5c3" stroke="#7fa5c3" stroke-width="2"/><text x="858.4" y="278" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">74</text><text x="78" y="372" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Field / UAV roles</text><rect x="280" y="342" width="760" height="30" rx="12" ry="12" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="280" y="342" width="471.2" height="30" rx="12" ry="12" fill="#c77b33" stroke="#c77b33" stroke-width="2"/><text x="767.2" y="364" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">62</text><text x="78" y="458" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Satellite operations</text><rect x="280" y="428" width="760" height="30" rx="12" ry="12" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="280" y="428" width="349.6" height="30" rx="12" ry="12" fill="#6c63a7" stroke="#6c63a7" stroke-width="2"/><text x="645.6" y="450" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">46</text><text x="78" y="544" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Public-sector windows</text><rect x="280" y="514" width="760" height="30" rx="12" ry="12" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="280" y="514" width="266.0" height="30" rx="12" ry="12" fill="#b9973f" stroke="#b9973f" stroke-width="2"/><text x="562.0" y="536" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">35</text><text x="78" y="630" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700" fill="#123f63" text-anchor="start">Pure space-hardware roles</text><rect x="280" y="600" width="760" height="30" rx="12" ry="12" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="280" y="600" width="152.0" height="30" rx="12" ry="12" fill="#b85b55" stroke="#b85b55" stroke-width="2"/><text x="448.0" y="622" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">20</text><rect x="92" y="646" width="1016" height="64" rx="16" ry="16" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="116" y="672" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="116" dy="0">Interpretation: the market is thickest where employers already recognize implementation, GIS delivery, and</tspan><tspan x="116" dy="24.3">adjacent digital work. Entry friction rises as the lane becomes narrower or more identity-rich.</tspan></text></svg>
