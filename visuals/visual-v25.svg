<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Choose a Pivot Lane">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">Choose a Pivot Lane</text>
<text class="headerSub" x="34" y="69">Pick one lane and accumulate proof in the same language</text><rect x="390" y="114" width="420" height="110" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="390" y="114" width="420" height="10" rx="18" ry="18" fill="#123f63"/><text x="408" y="156" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="408" dy="0">What kind of work do you</tspan><tspan x="408" dy="26.4">actually enjoy?</tspan></text><text x="408" y="214.4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="408" dy="0">Choose the lane by work style, not by the</tspan><tspan x="408" dy="18.9">fanciest label.</tspan></text><line x1="600" y1="224" x2="240" y2="310" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="140" y="332" width="200" height="240" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="140" y="332" width="200" height="10" rx="18" ry="18" fill="#123f63"/><text x="158" y="374" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="158" dy="0">I like data</tspan></text><text x="158" y="406.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="158" dy="0">Build Python, SQL,</tspan><tspan x="158" dy="24.3">one end-to-end</tspan><tspan x="158" dy="24.3">pipeline, and a</tspan><tspan x="158" dy="24.3">spatial-data</tspan><tspan x="158" dy="24.3">project.</tspan></text><line x1="600" y1="224" x2="490" y2="310" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="390" y="332" width="200" height="240" rx="18" ry="18" fill="#d9e8f2" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="390" y="332" width="200" height="10" rx="18" ry="18" fill="#123f63"/><text x="408" y="374" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="408" dy="0">I like</tspan><tspan x="408" dy="23.0">operations</tspan></text><text x="408" y="429.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="408" dy="0">Lean into satcom,</tspan><tspan x="408" dy="24.3">GNSS, systems</tspan><tspan x="408" dy="24.3">logs, reliability,</tspan><tspan x="408" dy="24.3">and</tspan><tspan x="408" dy="24.3">troubleshooting.</tspan></text><line x1="600" y1="224" x2="740" y2="310" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="640" y="332" width="200" height="240" rx="18" ry="18" fill="#f0eefb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="640" y="332" width="200" height="10" rx="18" ry="18" fill="#123f63"/><text x="658" y="374" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="658" dy="0">I like</tspan><tspan x="658" dy="23.0">infrastructure</tspan></text><text x="658" y="429.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="658" dy="0">Build Linux,</tspan><tspan x="658" dy="24.3">networking, cloud</tspan><tspan x="658" dy="24.3">basics, and one</tspan><tspan x="658" dy="24.3">deployed system.</tspan></text><line x1="600" y1="224" x2="990" y2="310" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="890" y="332" width="200" height="240" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="890" y="332" width="200" height="10" rx="18" ry="18" fill="#123f63"/><text x="908" y="374" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="908" dy="0">I like client-</tspan><tspan x="908" dy="23.0">facing GIS</tspan></text><text x="908" y="429.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="908" dy="0">Build ArcGIS or</tspan><tspan x="908" dy="24.3">QGIS delivery,</tspan><tspan x="908" dy="24.3">domain context,</tspan><tspan x="908" dy="24.3">and explanation</tspan><tspan x="908" dy="24.3">skills.</tspan></text><rect x="94" y="620" width="1010" height="72" rx="16" ry="16" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="118" y="648" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="118" dy="0">Action rule: pick one primary lane, then accumulate proof in the same language for at least 12 to 18 months</tspan><tspan x="118" dy="24.3">before trying to market yourself broadly.</tspan></text></svg>
