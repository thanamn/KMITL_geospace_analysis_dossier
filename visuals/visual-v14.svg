<text class="headerTitle" x="34" y="48">What the Hardware Path Really Means</text>
<text class="headerSub" x="34" y="69">A wider spectrum than students often imagine</text><rect x="100" y="260" width="980" height="110" rx="20" ry="20" fill="#eff4f8" stroke="#d8e0e8" stroke-width="2"/><rect x="100" y="282" width="340" height="66" rx="14" ry="14" fill="#eaf5ef" stroke="#2f7a57" stroke-width="2"/><text x="270.0" y="320" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="middle"><tspan x="270.0" dy="0">RF lab / GNSS / ground systems</tspan><tspan x="270.0" dy="24.3">/ teleport</tspan></text><rect x="460" y="282" width="220" height="66" rx="14" ry="14" fill="#f8f1dd" stroke="#c77b33" stroke-width="2"/><text x="570.0" y="320" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="middle"><tspan x="570.0" dy="0">AIT testing</tspan></text><rect x="760" y="282" width="140" height="66" rx="14" ry="14" fill="#fbeceb" stroke="#b85b55" stroke-width="2"/><text x="830.0" y="320" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="middle"><tspan x="830.0" dy="0">Satellite</tspan><tspan x="830.0" dy="24.3">component</tspan><tspan x="830.0" dy="24.3">manufacturing</tspan></text><path d="M210 420 L210 520 L520 520" fill="none" stroke="#2f7a57" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="110" y="450" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#2f7a57" text-anchor="start"><tspan x="110" dy="0">Largest Thai</tspan><tspan x="110" dy="24.3">opportunity zone</tspan></text><rect x="650" y="428" width="420" height="170" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="674" y="464" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start">Interpretation</text><text x="674" y="500" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="674" dy="0">The hardware path is wider than clean-</tspan><tspan x="674" dy="24.3">room assembly but narrower than the</tspan><tspan x="674" dy="24.3">whole degree. Thailand pays most</tspan><tspan x="674" dy="24.3">naturally for RF, GNSS, ground</tspan><tspan x="674" dy="24.3">systems, testing, and operations-</tspan><tspan x="674" dy="24.3">facing technical work.</tspan></text></svg>
