<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="From Rocket to Decision">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">From Rocket to Decision</text>
<text class="headerSub" x="34" y="69">Three stacked layers inside the degree</text><rect x="150" y="118" width="900" height="150" rx="18" ry="18" fill="#7fa5c3" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="150" y="118" width="900" height="10" rx="18" ry="18" fill="#123f63"/><text x="168" y="160" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="168" dy="0">1. Aerospace engineering</tspan></text><text x="168" y="192.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="168" dy="0">Moves the delivery vehicle through air and space.</tspan><tspan x="168" dy="24.3">Focus: propulsion, aerodynamics, loads, flight dynamics.</tspan></text><rect x="150" y="320" width="900" height="150" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="150" y="320" width="900" height="10" rx="18" ry="18" fill="#123f63"/><text x="168" y="362" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="168" dy="0">2. Space systems engineering</tspan></text><text x="168" y="394.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="168" dy="0">Runs the orbital mission machine after launch.</tspan><tspan x="168" dy="24.3">Focus: power, thermal, attitude control, onboard computing, payloads.</tspan></text><rect x="150" y="522" width="900" height="150" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="150" y="522" width="900" height="10" rx="18" ry="18" fill="#123f63"/><text x="168" y="564" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="168" dy="0">3. Geospatial engineering</tspan></text><text x="168" y="596.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="168" dy="0">Turns measurements linked to place into usable action.</tspan><tspan x="168" dy="24.3">Focus: imagery processing, GIS, positioning, modeling, decision support.</tspan></text><line x1="600" y1="268" x2="600" y2="304" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="600" y1="470" x2="600" y2="506" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="174" y="664" width="190" height="38" rx="19.0" ry="19.0" fill="#d9e8f2"/><text x="269.0" y="689.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#123f63" text-anchor="middle">Rocket / aircraft</text><rect x="505" y="664" width="250" height="38" rx="19.0" ry="19.0" fill="#f8f1dd"/><text x="630.0" y="689.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#123f63" text-anchor="middle">Satellite / payload / ground link</text><rect x="830" y="664" width="206" height="38" rx="19.0" ry="19.0" fill="#eaf5ef"/><text x="933.0" y="689.0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#123f63" text-anchor="middle">Flood map / telecom plan</text><text x="1166" y="740" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5f7385" text-anchor="end">Figure reinforces Chapter 1&#x27;s core stack logic.</text></svg>
