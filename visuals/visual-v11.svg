<text class="headerSub" x="34" y="69">What feeds later systems, GIS, and spatial AI work</text><rect x="70" y="170" width="270" height="108" rx="18" ry="18" fill="#d9e8f2" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="70" y="170" width="270" height="10" rx="18" ry="18" fill="#123f63"/><text x="88" y="212" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="88" dy="0">Linear algebra +</tspan><tspan x="88" dy="24.1">differential</tspan><tspan x="88" dy="24.1">equations</tspan></text><text x="88" y="292.2" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="88" dy="0">Year 2 dependency source</tspan></text><rect x="70" y="370" width="270" height="108" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="70" y="370" width="270" height="10" rx="18" ry="18" fill="#123f63"/><text x="88" y="412" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="88" dy="0">Object-oriented</tspan><tspan x="88" dy="24.1">programming</tspan></text><text x="88" y="468.1" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="88" dy="0">Year 2 dependency source</tspan></text><rect x="70" y="570" width="270" height="108" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="70" y="570" width="270" height="10" rx="18" ry="18" fill="#123f63"/><text x="88" y="612" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="88" dy="0">Electric circuit</tspan><tspan x="88" dy="24.1">analysis</tspan></text><text x="88" y="668.1" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="88" dy="0">Year 2 dependency source</tspan></text><rect x="450" y="140" width="300" height="100" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="450" y="140" width="300" height="10" rx="18" ry="18" fill="#123f63"/><text x="468" y="182" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="468" dy="0">Signals and systems</tspan></text><text x="468" y="214.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="468" dy="0">Courses or stacks that</tspan><tspan x="468" dy="18.9">build on it</tspan></text><rect x="450" y="300" width="300" height="100" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="450" y="300" width="300" height="10" rx="18" ry="18" fill="#123f63"/><text x="468" y="342" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="468" dy="0">Orbital mechanics</tspan></text><text x="468" y="374.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="468" dy="0">Courses or stacks that</tspan><tspan x="468" dy="18.9">build on it</tspan></text><rect x="450" y="460" width="300" height="100" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="450" y="460" width="300" height="10" rx="18" ry="18" fill="#123f63"/><text x="468" y="502" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="468" dy="0">Embedded systems</tspan></text><text x="468" y="534.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="468" dy="0">Courses or stacks that</tspan><tspan x="468" dy="18.9">build on it</tspan></text><rect x="450" y="620" width="300" height="100" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="450" y="620" width="300" height="10" rx="18" ry="18" fill="#123f63"/><text x="468" y="662" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="468" dy="0">Remote sensing + GIS +</tspan><tspan x="468" dy="23.0">Spatial AI</tspan></text><text x="468" y="717.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="468" dy="0">Courses or stacks that</tspan><tspan x="468" dy="18.9">build on it</tspan></text><line x1="340" y1="224" x2="450" y2="190" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="340" y1="224" x2="450" y2="350" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="340" y1="624" x2="450" y2="510" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="340" y1="424" x2="450" y2="510" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="340" y1="424" x2="450" y2="670" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="340" y1="624" x2="450" y2="670" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="340" y1="224" x2="450" y2="670" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="820" y="230" width="300" height="260" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2"/><text x="844" y="268" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#123f63" text-anchor="start">Read it this way</text><text x="844" y="302" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="844" dy="0">Year 2 is not a flat list of</tspan><tspan x="844" dy="24.3">subjects. It is where</tspan><tspan x="844" dy="24.3">abstraction compounds.</tspan><tspan x="844" dy="24.3">Students who miss the</tspan><tspan x="844" dy="24.3">mathematical or coding base</tspan><tspan x="844" dy="24.3">feel the strain later in</tspan><tspan x="844" dy="24.3">GIS, GNSS, AI, and systems</tspan><tspan x="844" dy="24.3">classes.</tspan></text></svg>
