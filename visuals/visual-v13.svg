<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Capstone or Co-op?">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">Capstone or Co-op?</text>
<text class="headerSub" x="34" y="69">Pick the branch that creates the stronger signal</text><rect x="410" y="116" width="380" height="106" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="410" y="116" width="380" height="10" rx="18" ry="18" fill="#123f63"/><text x="428" y="158" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="428" dy="0">Do you already have a strong</tspan><tspan x="428" dy="26.4">employer placement?</tspan></text><text x="428" y="216.4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="428" dy="0">The choice should follow quality and</tspan><tspan x="428" dy="18.9">conversion probability, not status</tspan><tspan x="428" dy="18.9">anxiety.</tspan></text><line x1="600" y1="222" x2="360" y2="300" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="600" y1="222" x2="840" y2="300" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="210" y="320" width="300" height="120" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="210" y="320" width="300" height="10" rx="18" ry="18" fill="#2f7a57"/><text x="228" y="362" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="228" dy="0">Yes</tspan></text><text x="228" y="394.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="228" dy="0">A good placement with real</tspan><tspan x="228" dy="18.9">work and conversion upside</tspan><tspan x="228" dy="18.9">usually favors co-op.</tspan></text><rect x="690" y="320" width="300" height="120" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="690" y="320" width="300" height="10" rx="18" ry="18" fill="#c77b33"/><text x="708" y="362" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="708" dy="0">No</tspan></text><text x="708" y="394.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="708" dy="0">Ask what kind of proof you</tspan><tspan x="708" dy="18.9">still need before</tspan><tspan x="708" dy="18.9">graduation.</tspan></text><line x1="840" y1="440" x2="690" y2="528" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="840" y1="440" x2="990" y2="528" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="540" y="548" width="260" height="132" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="540" y="548" width="260" height="10" rx="18" ry="18" fill="#123f63"/><text x="558" y="590" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="558" dy="0">Need stronger</tspan><tspan x="558" dy="26.4">portfolio / job</tspan><tspan x="558" dy="26.4">conversion</tspan></text><text x="558" y="674.8" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="558" dy="0">Prefer co-op if the</tspan><tspan x="558" dy="18.9">placement is real,</tspan><tspan x="558" dy="18.9">supervised, and path-</tspan><tspan x="558" dy="18.9">matched.</tspan></text><rect x="860" y="548" width="260" height="132" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="860" y="548" width="260" height="10" rx="18" ry="18" fill="#123f63"/><text x="878" y="590" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="878" dy="0">Targeting master&#x27;s</tspan><tspan x="878" dy="26.4">/ research /</tspan><tspan x="878" dy="26.4">deeper technical</tspan><tspan x="878" dy="26.4">project</tspan></text><text x="878" y="701.2" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="878" dy="0">Prefer capstone if</tspan><tspan x="878" dy="18.9">project quality and</tspan><tspan x="878" dy="18.9">supervision are</tspan><tspan x="878" dy="18.9">strong.</tspan></text><rect x="94" y="548" width="320" height="132" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="94" y="548" width="320" height="10" rx="18" ry="18" fill="#2f7a57"/><text x="112" y="590" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="112" dy="0">Already in a strong</tspan><tspan x="112" dy="26.4">employer lane</tspan></text><text x="112" y="648.4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="112" dy="0">Co-op is the cleaner signal</tspan><tspan x="112" dy="18.9">when the placement itself is</tspan><tspan x="112" dy="18.9">the asset.</tspan></text></svg>
