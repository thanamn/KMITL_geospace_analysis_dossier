<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="From Imagery to ESG Decision">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">From Imagery to ESG Decision</text>
<text class="headerSub" x="34" y="69">Spatial evidence as a compliance-grade workflow</text><rect x="30" y="196" width="170" height="250" rx="18" ry="18" fill="#d9e8f2" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="30" y="196" width="170" height="10" rx="18" ry="18" fill="#123f63"/><text x="48" y="238" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="48" dy="0">Boundary</tspan></text><text x="48" y="270.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="48" dy="0">Define parcels,</tspan><tspan x="48" dy="24.3">sites, or</tspan><tspan x="48" dy="24.3">compliance scope.</tspan></text><line x1="200" y1="321" x2="220" y2="321" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="220" y="196" width="170" height="250" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="220" y="196" width="170" height="10" rx="18" ry="18" fill="#123f63"/><text x="238" y="238" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="238" dy="0">Collect</tspan></text><text x="238" y="270.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="238" dy="0">Use satellite,</tspan><tspan x="238" dy="24.3">drone, field, or</tspan><tspan x="238" dy="24.3">registry data.</tspan></text><line x1="390" y1="321" x2="410" y2="321" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="410" y="196" width="170" height="250" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="410" y="196" width="170" height="10" rx="18" ry="18" fill="#123f63"/><text x="428" y="238" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="428" dy="0">Detect</tspan></text><text x="428" y="270.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="428" dy="0">Run change</tspan><tspan x="428" dy="24.3">detection and</tspan><tspan x="428" dy="24.3">evidence checks.</tspan></text><line x1="580" y1="321" x2="600" y2="321" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="600" y="196" width="170" height="250" rx="18" ry="18" fill="#f0eefb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="600" y="196" width="170" height="10" rx="18" ry="18" fill="#123f63"/><text x="618" y="238" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="618" dy="0">Overlay</tspan></text><text x="618" y="270.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="618" dy="0">Join imagery with</tspan><tspan x="618" dy="24.3">parcels, permits,</tspan><tspan x="618" dy="24.3">and ownership.</tspan></text><line x1="770" y1="321" x2="790" y2="321" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="790" y="196" width="170" height="250" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="790" y="196" width="170" height="10" rx="18" ry="18" fill="#123f63"/><text x="808" y="238" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="808" dy="0">Dashboard</tspan></text><text x="808" y="270.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="808" dy="0">Summarize carbon,</tspan><tspan x="808" dy="24.3">land, or pollution</tspan><tspan x="808" dy="24.3">signals.</tspan></text><line x1="960" y1="321" x2="980" y2="321" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="980" y="196" width="170" height="250" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="980" y="196" width="170" height="10" rx="18" ry="18" fill="#123f63"/><text x="998" y="238" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="998" dy="0">Decision</tspan></text><text x="998" y="270.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="998" dy="0">Move to audit,</tspan><tspan x="998" dy="24.3">compliance, or</tspan><tspan x="998" dy="24.3">management action.</tspan></text><rect x="140" y="516" width="920" height="110" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="164" y="548" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="164" dy="0">This is why ESG, carbon tracking, land verification, and environmental-spatial work can absorb</tspan><tspan x="164" dy="24.3">graduates. The value sits in the traceable chain from evidence to action, not in map aesthetics</tspan><tspan x="164" dy="24.3">alone.</tspan></text></svg>
