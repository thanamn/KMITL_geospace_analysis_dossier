<text class="headerSub" x="34" y="69">Specialized GIS versus broader technical markets</text><text x="300" y="158" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#5f7385" text-anchor="start">Narrower visible opening volume</text><text x="1060" y="158" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#5f7385" text-anchor="end">Broader visible opening volume</text><text x="92" y="220" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start">GIS-specialized roles</text><rect x="300" y="192" width="760" height="34" rx="14" ry="14" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="300" y="192" width="106.4" height="34" rx="14" ry="14" fill="#b85b55" stroke="#b85b55" stroke-width="2"/><text x="422.4" y="214" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">14</text><text x="92" y="316" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start">Telecom roles</text><rect x="300" y="288" width="760" height="34" rx="14" ry="14" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="300" y="288" width="592.8" height="34" rx="14" ry="14" fill="#c77b33" stroke="#c77b33" stroke-width="2"/><text x="908.8" y="310" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">78</text><text x="92" y="412" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start">Network roles</text><rect x="300" y="384" width="760" height="34" rx="14" ry="14" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="300" y="384" width="638.4" height="34" rx="14" ry="14" fill="#7fa5c3" stroke="#7fa5c3" stroke-width="2"/><text x="954.4" y="406" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">84</text><text x="92" y="508" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start">Cloud roles</text><rect x="300" y="480" width="760" height="34" rx="14" ry="14" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="300" y="480" width="668.8" height="34" rx="14" ry="14" fill="#6c63a7" stroke="#6c63a7" stroke-width="2"/><text x="984.8" y="502" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">88</text><text x="92" y="604" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start">Data roles</text><rect x="300" y="576" width="760" height="34" rx="14" ry="14" fill="#edf2f6" stroke="#d8e0e8" stroke-width="2"/><rect x="300" y="576" width="699.2" height="34" rx="14" ry="14" fill="#2f7a57" stroke="#2f7a57" stroke-width="2"/><text x="1015.2" y="598" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#1f2f3d" text-anchor="start">92</text><rect x="100" y="660" width="990" height="60" rx="16" ry="16" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="124" y="686" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="124" dy="0">Reading: the degree becomes safer when it can translate into adjacent, thicker markets rather than waiting</tspan><tspan x="124" dy="24.3">for a pure space or narrow GIS opening.</tspan></text></svg>
