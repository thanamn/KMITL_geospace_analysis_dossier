<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Thai Space Value Chain Thickness">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">Thai Space Value Chain Thickness</text>
<text class="headerSub" x="34" y="69">Where labor demand is thick versus thin</text><rect x="96" y="170" width="1020" height="92" rx="18" ry="18" fill="#eaf5ef" stroke="#2f7a57" stroke-width="2" filter="url(#shadow)"/><text x="122" y="208" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#123f63" text-anchor="start">Data / applications</text><text x="122" y="238" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="122" dy="0">Thaicom data products, GIS teams, analytics, climate and disaster use cases</tspan></text><rect x="96" y="282" width="860" height="92" rx="18" ry="18" fill="#d9e8f2" stroke="#123f63" stroke-width="2" filter="url(#shadow)"/><text x="122" y="320" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#123f63" text-anchor="start">Telecom / ground systems</text><text x="122" y="350" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="122" dy="0">NT, satcom operations, RF, GNSS, ground-segment and network</tspan><tspan x="122" dy="23.0">work</tspan></text><rect x="96" y="394" width="690" height="92" rx="18" ry="18" fill="#f8f1dd" stroke="#c77b33" stroke-width="2" filter="url(#shadow)"/><text x="122" y="432" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#123f63" text-anchor="start">Public mission support</text><text x="122" y="462" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="122" dy="0">GISTDA, state projects, mission operations,</tspan><tspan x="122" dy="23.0">procurement-linked technical work</tspan></text><rect x="96" y="506" width="420" height="92" rx="18" ry="18" fill="#fbeceb" stroke="#b85b55" stroke-width="2" filter="url(#shadow)"/><text x="122" y="544" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#123f63" text-anchor="start">Hardware manufacturing</text><text x="122" y="574" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="122" dy="0">Narrowest Thai lane: testing,</tspan><tspan x="122" dy="23.0">components, and selected</tspan><tspan x="122" dy="23.0">high-friction hardware roles</tspan></text><text x="96" y="632" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#5f7385" text-anchor="start"><tspan x="96" dy="0">Interpretation: the degree is safest where Thai demand already exists in services, systems, and data.</tspan><tspan x="96" dy="24.3">The hardware band is real, but visibly thinner.</tspan></text><text x="1166" y="740" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5f7385" text-anchor="end">Visual width indicates market thickness, not numeric headcount.</text></svg>
