</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">What Spatial AI Work Actually Looks Like</text>
<text class="headerSub" x="34" y="69">A concrete analytics pipeline</text><rect x="70" y="160" width="240" height="88" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="70" y="160" width="240" height="10" rx="18" ry="18" fill="#123f63"/><text x="88" y="202" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="88" dy="0">NSDC / satellite</tspan><tspan x="88" dy="23.0">feeds</tspan></text><text x="88" y="257.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="88" dy="0">Source layer</tspan></text><line x1="310" y1="204" x2="420" y2="340" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="70" y="286" width="240" height="88" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="70" y="286" width="240" height="10" rx="18" ry="18" fill="#123f63"/><text x="88" y="328" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="88" dy="0">Drones + imagery</tspan></text><text x="88" y="360.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="88" dy="0">Source layer</tspan></text><line x1="310" y1="330" x2="420" y2="340" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="70" y="412" width="240" height="88" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="70" y="412" width="240" height="10" rx="18" ry="18" fill="#123f63"/><text x="88" y="454" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="88" dy="0">Internal GIS /</tspan><tspan x="88" dy="23.0">asset data</tspan></text><text x="88" y="509.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="88" dy="0">Source layer</tspan></text><line x1="310" y1="456" x2="420" y2="340" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="70" y="538" width="240" height="88" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="70" y="538" width="240" height="10" rx="18" ry="18" fill="#123f63"/><text x="88" y="580" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="88" dy="0">Surveys + field</tspan><tspan x="88" dy="23.0">reports</tspan></text><text x="88" y="635.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="88" dy="0">Source layer</tspan></text><line x1="310" y1="582" x2="420" y2="340" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="420" y="228" width="300" height="232" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="420" y="228" width="300" height="10" rx="18" ry="18" fill="#c77b33"/><text x="438" y="270" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="438" dy="0">Python / GEE / GIS</tspan><tspan x="438" dy="26.4">processing</tspan></text><text x="438" y="328.4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="438" dy="0">Clean, align, clip, derive</tspan><tspan x="438" dy="24.3">features, run rules or</tspan><tspan x="438" dy="24.3">models, then prepare outputs</tspan><tspan x="438" dy="24.3">for review.</tspan></text><rect x="810" y="228" width="260" height="110" rx="18" ry="18" fill="#f0eefb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="810" y="228" width="260" height="10" rx="18" ry="18" fill="#6c63a7"/><text x="828" y="270" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="828" dy="0">Model or rule-</tspan><tspan x="828" dy="26.4">based analysis</tspan></text><text x="828" y="328.4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="828" dy="0">Classification,</tspan><tspan x="828" dy="18.9">scoring, anomaly</tspan><tspan x="828" dy="18.9">detection, trend</tspan><tspan x="828" dy="18.9">logic.</tspan></text><rect x="810" y="366" width="260" height="110" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="810" y="366" width="260" height="10" rx="18" ry="18" fill="#123f63"/><text x="828" y="408" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="828" dy="0">QA</tspan></text><text x="828" y="440.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="828" dy="0">Validate assumptions,</tspan><tspan x="828" dy="18.9">edge cases, and</tspan><tspan x="828" dy="18.9">obvious errors before</tspan><tspan x="828" dy="18.9">delivery.</tspan></text><rect x="810" y="504" width="260" height="110" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="810" y="504" width="260" height="10" rx="18" ry="18" fill="#2f7a57"/><text x="828" y="546" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="828" dy="0">Dashboard / map</tspan><tspan x="828" dy="26.4">service / report</tspan></text><text x="828" y="604.4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="828" dy="0">Operational surface</tspan><tspan x="828" dy="18.9">that stakeholders can</tspan><tspan x="828" dy="18.9">actually use.</tspan></text><line x1="720" y1="344" x2="810" y2="282" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="720" y1="344" x2="810" y2="420" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="940" y1="476" x2="940" y2="504" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/></svg>
