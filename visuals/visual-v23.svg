<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="International Pathways Funnel">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">International Pathways Funnel</text>
<text class="headerSub" x="34" y="69">Not every international route is equally realistic</text><polygon points="104.0,150 1096.0,150 1120.0,236 80.0,236" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2"/><text x="600.0" y="184" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#123f63" text-anchor="middle">Thailand-first growth</text><text x="600.0" y="208" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="middle"><tspan x="600.0" dy="0">Best realism: build proof locally, then move with evidence.</tspan></text><polygon points="164.0,242 1036.0,242 1060.0,328 140.0,328" fill="#d9e8f2" stroke="#d8e0e8" stroke-width="2"/><text x="600.0" y="276" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#123f63" text-anchor="middle">Regional downstream move</text><text x="600.0" y="300" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="middle"><tspan x="600.0" dy="0">Singapore and Southeast Asia downstream geospatial work.</tspan></text><polygon points="234.0,334 966.0,334 990.0,420 210.0,420" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2"/><text x="600.0" y="368" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#123f63" text-anchor="middle">Master&#x27;s-first path</text><text x="600.0" y="392" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="middle"><tspan x="600.0" dy="0">Adds credibility, resets geography, and opens research-</tspan><tspan x="600.0" dy="23.0">led entry.</tspan></text><polygon points="314.0,426 886.0,426 910.0,512 290.0,512" fill="#f0eefb" stroke="#d8e0e8" stroke-width="2"/><text x="600.0" y="460" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#123f63" text-anchor="middle">Japan / Europe civil route</text><text x="600.0" y="484" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="middle"><tspan x="600.0" dy="0">Possible, but narrower and often language or</tspan><tspan x="600.0" dy="23.0">institution filtered.</tspan></text><polygon points="409.0,518 791.0,518 815.0,604 385.0,604" fill="#fff4e9" stroke="#d8e0e8" stroke-width="2"/><text x="600.0" y="552" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#123f63" text-anchor="middle">U.S. commercial</text><text x="600.0" y="576" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="middle"><tspan x="600.0" dy="0">Harder due to distance,</tspan><tspan x="600.0" dy="23.0">competition, and path</tspan><tspan x="600.0" dy="23.0">sequencing.</tspan></text><polygon points="494.0,610 706.0,610 730.0,696 470.0,696" fill="#fbeceb" stroke="#d8e0e8" stroke-width="2"/><text x="600.0" y="644" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#123f63" text-anchor="middle">Direct U.S. defense entry</text><text x="600.0" y="668" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="400" fill="#5f7385" text-anchor="middle"><tspan x="600.0" dy="0">Highest friction because</tspan><tspan x="600.0" dy="23.0">export-control and</tspan><tspan x="600.0" dy="23.0">nationality realities</tspan><tspan x="600.0" dy="23.0">matter.</tspan></text><text x="1166" y="740" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5f7385" text-anchor="end">Wider bands = more realistic sequencing for most Thai students.</text></svg>
