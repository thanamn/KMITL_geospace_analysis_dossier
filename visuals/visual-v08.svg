<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Who Should Choose KMITL?">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">Who Should Choose KMITL?</text>
<text class="headerSub" x="34" y="69">Decision tree across prestige, aerospace, hybrid, and GIS options</text><rect x="420" y="126" width="360" height="120" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="420" y="126" width="360" height="10" rx="18" ry="18" fill="#123f63"/><text x="438" y="168" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="438" dy="0">What do you want most?</tspan></text><text x="438" y="200.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="438" dy="0">Start with the honest motive, not the</tspan><tspan x="438" dy="18.9">most glamorous label.</tspan></text><line x1="600" y1="246" x2="90" y2="312" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="-10" y="332" width="200" height="260" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="-10" y="332" width="200" height="10" rx="18" ry="18" fill="#7fa5c3"/><text x="8" y="374" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="8" dy="0">Prestige /</tspan><tspan x="8" dy="24.1">easiest</tspan><tspan x="8" dy="24.1">recognition</tspan></text><text x="8" y="454.2" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="8" dy="0">Chula or other</tspan><tspan x="8" dy="20.2">prestige-heavy</tspan><tspan x="8" dy="20.2">route</tspan><tspan x="8" dy="20.2">Stronger title</tspan><tspan x="8" dy="20.2">recognition, less</tspan><tspan x="8" dy="20.2">hybrid identity</tspan></text><line x1="600" y1="246" x2="320" y2="312" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="220" y="332" width="200" height="260" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="220" y="332" width="200" height="10" rx="18" ry="18" fill="#7fa5c3"/><text x="238" y="374" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="238" dy="0">Pure aerospace</tspan><tspan x="238" dy="24.1">identity</tspan></text><text x="238" y="430.1" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="238" dy="0">Choose only if</tspan><tspan x="238" dy="20.2">vehicle-centric</tspan><tspan x="238" dy="20.2">mechanics,</tspan><tspan x="238" dy="20.2">propulsion, and</tspan><tspan x="238" dy="20.2">aerospace</tspan><tspan x="238" dy="20.2">prestige are the</tspan><tspan x="238" dy="20.2">real goal</tspan></text><line x1="600" y1="246" x2="550" y2="312" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="450" y="332" width="200" height="260" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="450" y="332" width="200" height="10" rx="18" ry="18" fill="#7fa5c3"/><text x="468" y="374" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="468" dy="0">Hybrid space +</tspan><tspan x="468" dy="24.1">GIS</tspan></text><text x="468" y="430.1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="468" dy="0">KMITL&#x27;s best-fit</tspan><tspan x="468" dy="24.3">lane</tspan><tspan x="468" dy="24.3">Telecom, sensing,</tspan><tspan x="468" dy="24.3">GNSS, GIS, and</tspan><tspan x="468" dy="24.3">systems logic</tspan></text><line x1="600" y1="246" x2="780" y2="312" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="680" y="332" width="200" height="260" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="680" y="332" width="200" height="10" rx="18" ry="18" fill="#7fa5c3"/><text x="698" y="374" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="698" dy="0">Pure</tspan><tspan x="698" dy="24.1">geospatial</tspan><tspan x="698" dy="24.1">depth</tspan></text><text x="698" y="454.2" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="698" dy="0">Choose a GIS-</tspan><tspan x="698" dy="20.2">first or survey-</tspan><tspan x="698" dy="20.2">first program if</tspan><tspan x="698" dy="20.2">Earth-side</tspan><tspan x="698" dy="20.2">analysis is the</tspan><tspan x="698" dy="20.2">whole point</tspan></text><line x1="600" y1="246" x2="1010" y2="312" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="910" y="332" width="200" height="260" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="910" y="332" width="200" height="10" rx="18" ry="18" fill="#7fa5c3"/><text x="928" y="374" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="928" dy="0">Postgraduate</tspan><tspan x="928" dy="24.1">specialization</tspan></text><text x="928" y="430.1" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="928" dy="0">Generalist now,</tspan><tspan x="928" dy="24.3">specialize harder</tspan><tspan x="928" dy="24.3">later if master&#x27;s</tspan><tspan x="928" dy="24.3">study is already</tspan><tspan x="928" dy="24.3">part of the plan</tspan></text></svg>
