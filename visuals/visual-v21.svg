roke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><line x1="1130" y1="312" x2="1160" y2="292" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><text x="184" y="192" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#2f7a57" text-anchor="start">Broader GIS / data ladder</text><text x="790" y="192" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#123f63" text-anchor="start">Narrower satcom / systems ladder</text><rect x="150" y="600" width="950" height="74" rx="16" ry="16" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="174" y="628" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="174" dy="0">Both ladders can reach authority and leadership, but the GIS/data side branches wider while the</tspan><tspan x="174" dy="24.3">satcom/systems side stays more selective and path-dependent.</tspan></text></svg>
