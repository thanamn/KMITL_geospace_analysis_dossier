<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="GIS Delivery Chain">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">GIS Delivery Chain</text>
<text class="headerSub" x="34" y="69">The data/GIS job is a delivery system</text><rect x="50" y="212" width="208" height="232" rx="18" ry="18" fill="#d9e8f2" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="50" y="212" width="208" height="10" rx="18" ry="18" fill="#123f63"/><text x="68" y="254" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="68" dy="0">Raw data</tspan></text><text x="68" y="286.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="68" dy="0">Imagery, vectors,</tspan><tspan x="68" dy="24.3">GPS, surveys, admin</tspan><tspan x="68" dy="24.3">layers</tspan></text><line x1="258" y1="328" x2="280" y2="328" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="280" y="212" width="208" height="232" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="280" y="212" width="208" height="10" rx="18" ry="18" fill="#123f63"/><text x="298" y="254" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="298" dy="0">Cleaning + CRS</tspan><tspan x="298" dy="26.4">checks</tspan></text><text x="298" y="312.4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="298" dy="0">Fix geometry,</tspan><tspan x="298" dy="24.3">metadata,</tspan><tspan x="298" dy="24.3">duplicates,</tspan><tspan x="298" dy="24.3">coordinate systems</tspan></text><line x1="488" y1="328" x2="510" y2="328" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="510" y="212" width="208" height="232" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="510" y="212" width="208" height="10" rx="18" ry="18" fill="#123f63"/><text x="528" y="254" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="528" dy="0">Analysis +</tspan><tspan x="528" dy="26.4">modeling</tspan></text><text x="528" y="312.4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="528" dy="0">Spatial joins,</tspan><tspan x="528" dy="24.3">rules, statistics,</tspan><tspan x="528" dy="24.3">ML, QA</tspan></text><line x1="718" y1="328" x2="740" y2="328" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="740" y="212" width="208" height="232" rx="18" ry="18" fill="#f0eefb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="740" y="212" width="208" height="10" rx="18" ry="18" fill="#123f63"/><text x="758" y="254" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="758" dy="0">Delivery</tspan><tspan x="758" dy="26.4">outputs</tspan></text><text x="758" y="312.4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="758" dy="0">Maps, dashboards,</tspan><tspan x="758" dy="24.3">APIs, reports,</tspan><tspan x="758" dy="24.3">layers</tspan></text><line x1="948" y1="328" x2="970" y2="328" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="970" y="212" width="208" height="232" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="970" y="212" width="208" height="10" rx="18" ry="18" fill="#123f63"/><text x="988" y="254" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="988" dy="0">Operational</tspan><tspan x="988" dy="26.4">use</tspan></text><text x="988" y="312.4" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="988" dy="0">Client decision,</tspan><tspan x="988" dy="24.3">internal workflow,</tspan><tspan x="988" dy="24.3">risk response</tspan></text><rect x="126" y="516" width="948" height="96" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="150" y="548" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="150" dy="0">The point of the data/GIS lane is delivery discipline. The map is not the job. The usable chain from</tspan><tspan x="150" dy="24.3">messy input to trusted operational output is the job.</tspan></text></svg>
