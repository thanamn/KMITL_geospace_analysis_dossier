<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Flood Intelligence Pipeline">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">Flood Intelligence Pipeline</text>
<text class="headerSub" x="34" y="69">How a Thai flood workflow turns sensing into action</text><rect x="38" y="180" width="212" height="260" rx="18" ry="18" fill="#d9e8f2" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="38" y="180" width="212" height="10" rx="18" ry="18" fill="#123f63"/><text x="56" y="222" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="56" dy="0">Acquire</tspan></text><text x="56" y="254.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="56" dy="0">Satellites, UAVs,</tspan><tspan x="56" dy="24.3">and gauges collect</tspan><tspan x="56" dy="24.3">the first signal.</tspan></text><line x1="250" y1="310" x2="270" y2="310" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="270" y="180" width="212" height="260" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="270" y="180" width="212" height="10" rx="18" ry="18" fill="#123f63"/><text x="288" y="222" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="288" dy="0">Preprocess</tspan></text><text x="288" y="254.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="288" dy="0">Correct imagery,</tspan><tspan x="288" dy="24.3">clean radar</tspan><tspan x="288" dy="24.3">scenes, and</tspan><tspan x="288" dy="24.3">normalize inputs.</tspan></text><line x1="482" y1="310" x2="502" y2="310" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="502" y="180" width="212" height="260" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="502" y="180" width="212" height="10" rx="18" ry="18" fill="#123f63"/><text x="520" y="222" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="520" dy="0">Overlay</tspan></text><text x="520" y="254.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="520" dy="0">Join flood extent</tspan><tspan x="520" dy="24.3">with roads,</tspan><tspan x="520" dy="24.3">terrain,</tspan><tspan x="520" dy="24.3">districts,</tspan><tspan x="520" dy="24.3">hospitals, and</tspan><tspan x="520" dy="24.3">assets.</tspan></text><line x1="714" y1="310" x2="734" y2="310" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="734" y="180" width="212" height="260" rx="18" ry="18" fill="#f0eefb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="734" y="180" width="212" height="10" rx="18" ry="18" fill="#123f63"/><text x="752" y="222" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="752" dy="0">Model</tspan></text><text x="752" y="254.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="752" dy="0">Add rainfall-</tspan><tspan x="752" dy="24.3">runoff or</tspan><tspan x="752" dy="24.3">inundation models</tspan><tspan x="752" dy="24.3">if forecasting is</tspan><tspan x="752" dy="24.3">needed.</tspan></text><line x1="946" y1="310" x2="966" y2="310" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="966" y="180" width="212" height="260" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="966" y="180" width="212" height="10" rx="18" ry="18" fill="#123f63"/><text x="984" y="222" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="984" dy="0">Act</tspan></text><text x="984" y="254.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="984" dy="0">RID, BMA, GISTDA,</tspan><tspan x="984" dy="24.3">and local</tspan><tspan x="984" dy="24.3">operators shift</tspan><tspan x="984" dy="24.3">from awareness to</tspan><tspan x="984" dy="24.3">response.</tspan></text><rect x="110" y="492" width="980" height="110" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="134" y="532" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start">Why this matters</text><text x="134" y="562" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="134" dy="0">Flood work only creates value when observation becomes location-specific operational action. The</tspan><tspan x="134" dy="24.3">visual shows why KMITL&#x27;s space layer and geospatial layer are economically linked in Thailand.</tspan></text><text x="1166" y="740" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#5f7385" text-anchor="end">Chao Phraya flood-monitoring workflow.</text></svg>
