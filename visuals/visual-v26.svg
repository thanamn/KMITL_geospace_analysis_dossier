<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Four-Year Playbook at a Glance">
<defs>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="9" refY="4.5" orient="auto" markerUnits="strokeWidth">
    <path d="M0,0 L9,4.5 L0,9 z" fill="#123f63"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#173048" flood-opacity="0.08"/>
  </filter>
</defs>
<style>
  .frame { fill: #fbfdff; stroke: #d8e0e8; stroke-width: 2; }
  .header { fill: #123f63; }
  .headerTitle { font: 700 34px Arial, Helvetica, sans-serif; fill: #ffffff; letter-spacing: 0.2px; }
  .headerSub { font: 18px Arial, Helvetica, sans-serif; fill: #d8e6f0; }
  .panel { fill: #ffffff; stroke: #d8e0e8; stroke-width: 2; }
  .panelSoft { fill: #f4f8fb; stroke: #d8e0e8; stroke-width: 2; }
  .title { font: 700 24px Arial, Helvetica, sans-serif; fill: #123f63; }
  .body { font: 18px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .small { font: 15px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .axis { font: 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
  .chip { font: 700 16px Arial, Helvetica, sans-serif; fill: #123f63; }
  .label { font: 700 18px Arial, Helvetica, sans-serif; fill: #123f63; }
  .value { font: 700 18px Arial, Helvetica, sans-serif; fill: #1f2f3d; }
  .mutedStrong { font: 700 16px Arial, Helvetica, sans-serif; fill: #5f7385; }
</style>
<rect class="frame" x="1" y="1" rx="22" ry="22" width="1198" height="758"/>
<rect class="header" x="0" y="0" width="1200" height="82"/>
<text class="headerTitle" x="34" y="48">Four-Year Playbook at a Glance</text>
<text class="headerSub" x="34" y="69">What each year is supposed to produce</text><rect x="54" y="220" width="248" height="260" rx="18" ry="18" fill="#d9e8f2" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="54" y="220" width="248" height="10" rx="18" ry="18" fill="#123f63"/><text x="72" y="262" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="72" dy="0">Year 1</tspan></text><text x="72" y="294.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="72" dy="0">Survival + habits</tspan><tspan x="72" dy="24.3">Math, physics, coding</tspan><tspan x="72" dy="24.3">basics, mini project.</tspan></text><line x1="302" y1="350" x2="338" y2="350" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="338" y="220" width="248" height="260" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="338" y="220" width="248" height="10" rx="18" ry="18" fill="#123f63"/><text x="356" y="262" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="356" dy="0">Year 2</tspan></text><text x="356" y="294.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="356" dy="0">Lane choice + lab</tspan><tspan x="356" dy="24.3">entry</tspan><tspan x="356" dy="24.3">Decide whether your</tspan><tspan x="356" dy="24.3">gravity is GIS/data,</tspan><tspan x="356" dy="24.3">satcom, systems, or</tspan><tspan x="356" dy="24.3">hardware-adjacent.</tspan></text><line x1="586" y1="350" x2="622" y2="350" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="622" y="220" width="248" height="260" rx="18" ry="18" fill="#f0eefb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="622" y="220" width="248" height="10" rx="18" ry="18" fill="#123f63"/><text x="640" y="262" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="640" dy="0">Year 3</tspan></text><text x="640" y="294.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="640" dy="0">External proof</tspan><tspan x="640" dy="24.3">Industrial training,</tspan><tspan x="640" dy="24.3">one path-matched</tspan><tspan x="640" dy="24.3">credential, and a</tspan><tspan x="640" dy="24.3">serious project</tspan><tspan x="640" dy="24.3">artifact.</tspan></text><line x1="870" y1="350" x2="906" y2="350" stroke="#123f63" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/><rect x="906" y="220" width="248" height="260" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="906" y="220" width="248" height="10" rx="18" ry="18" fill="#123f63"/><text x="924" y="262" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="924" dy="0">Year 4</tspan></text><text x="924" y="294.0" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="924" dy="0">Conversion</tspan><tspan x="924" dy="24.3">Capstone or co-op</tspan><tspan x="924" dy="24.3">becomes the bridge to</tspan><tspan x="924" dy="24.3">a job, graduate study,</tspan><tspan x="924" dy="24.3">or regional move.</tspan></text><rect x="112" y="560" width="976" height="108" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="138" y="598" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start">Core sequencing rule</text><text x="138" y="628" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="138" dy="0">Do not optimize for activity count. Optimize for artifacts and references that make the next year easier.</tspan><tspan x="138" dy="24.3">Every year should leave one proof asset that survives into the next one.</tspan></text></svg>
