<text class="headerSub" x="34" y="69">Daily rhythm in the data/GIS lane</text><line x1="120" y1="380" x2="1080" y2="380" stroke="#123f63" stroke-width="5" stroke-linecap="round"/><line x1="140" y1="360" x2="140" y2="400" stroke="#123f63" stroke-width="4" stroke-linecap="round"/><text x="140" y="430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="middle">08:30</text><line x1="320" y1="360" x2="320" y2="400" stroke="#123f63" stroke-width="4" stroke-linecap="round"/><text x="320" y="430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="middle">10:30</text><line x1="500" y1="360" x2="500" y2="400" stroke="#123f63" stroke-width="4" stroke-linecap="round"/><text x="500" y="430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="middle">12:00</text><line x1="680" y1="360" x2="680" y2="400" stroke="#123f63" stroke-width="4" stroke-linecap="round"/><text x="680" y="430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="middle">14:00</text><line x1="860" y1="360" x2="860" y2="400" stroke="#123f63" stroke-width="4" stroke-linecap="round"/><text x="860" y="430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="middle">16:00</text><line x1="1040" y1="360" x2="1040" y2="400" stroke="#123f63" stroke-width="4" stroke-linecap="round"/><text x="1040" y="430" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="middle">18:00</text><rect x="50.0" y="230" width="180" height="92" rx="18" ry="18" fill="#d9e8f2" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="50.0" y="230" width="180" height="10" rx="18" ry="18" fill="#123f63"/><text x="68.0" y="272" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="68.0" dy="0">Morning data</tspan><tspan x="68.0" dy="20.7">pull + script</tspan><tspan x="68.0" dy="20.7">work</tspan></text><line x1="140" y1="380" x2="140" y2="322" stroke="#d8e0e8" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8"/><rect x="230.0" y="474" width="180" height="92" rx="18" ry="18" fill="#ffffff" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="230.0" y="474" width="180" height="10" rx="18" ry="18" fill="#123f63"/><text x="248.0" y="516" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="248.0" dy="0">Validation,</tspan><tspan x="248.0" dy="20.7">QA, issue</tspan><tspan x="248.0" dy="20.7">triage</tspan></text><line x1="320" y1="380" x2="320" y2="474" stroke="#d8e0e8" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8"/><rect x="410.0" y="230" width="180" height="92" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="410.0" y="230" width="180" height="10" rx="18" ry="18" fill="#123f63"/><text x="428.0" y="272" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="428.0" dy="0">Team sync /</tspan><tspan x="428.0" dy="20.7">stakeholder</tspan><tspan x="428.0" dy="20.7">check-in</tspan></text><line x1="500" y1="380" x2="500" y2="322" stroke="#d8e0e8" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8"/><rect x="590.0" y="474" width="180" height="92" rx="18" ry="18" fill="#f0eefb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="590.0" y="474" width="180" height="10" rx="18" ry="18" fill="#123f63"/><text x="608.0" y="516" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="608.0" dy="0">Model runs,</tspan><tspan x="608.0" dy="20.7">dashboards,</tspan><tspan x="608.0" dy="20.7">report</tspan><tspan x="608.0" dy="20.7">drafting</tspan></text><line x1="680" y1="380" x2="680" y2="474" stroke="#d8e0e8" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8"/><rect x="770.0" y="230" width="180" height="92" rx="18" ry="18" fill="#eaf5ef" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="770.0" y="230" width="180" height="10" rx="18" ry="18" fill="#123f63"/><text x="788.0" y="272" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="788.0" dy="0">Ad hoc</tspan><tspan x="788.0" dy="20.7">requests /</tspan><tspan x="788.0" dy="20.7">revisions /</tspan><tspan x="788.0" dy="20.7">follow-ups</tspan></text><line x1="860" y1="380" x2="860" y2="322" stroke="#d8e0e8" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8"/><rect x="950.0" y="474" width="180" height="92" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="950.0" y="474" width="180" height="10" rx="18" ry="18" fill="#123f63"/><text x="968.0" y="516" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="968.0" dy="0">End-of-day</tspan><tspan x="968.0" dy="20.7">pipeline and</tspan><tspan x="968.0" dy="20.7">delivery</tspan><tspan x="968.0" dy="20.7">checks</tspan></text><line x1="1040" y1="380" x2="1040" y2="474" stroke="#d8e0e8" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 8"/><rect x="130" y="620" width="940" height="70" rx="16" ry="16" fill="#ffffff" stroke="#d8e0e8" stroke-width="2"/><text x="154" y="648" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="154" dy="0">Daily reality: more pipeline ownership and stakeholder communication than most students imagine, but</tspan><tspan x="154" dy="24.3">usually more flexibility than hardware lab or shift-heavy work.</tspan></text></svg>
