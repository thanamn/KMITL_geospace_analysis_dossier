<text class="headerSub" x="34" y="69">The first half of the degree is a prerequisite system</text><rect x="66" y="210" width="240" height="132" rx="18" ry="18" fill="#d9e8f2" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="66" y="210" width="240" height="10" rx="18" ry="18" fill="#123f63"/><text x="84" y="252" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="84" dy="0">Math foundations</tspan></text><text x="84" y="284.0" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="84" dy="0">Calculus, linear</tspan><tspan x="84" dy="18.9">algebra,</tspan><tspan x="84" dy="18.9">differential</tspan><tspan x="84" dy="18.9">equations,</tspan><tspan x="84" dy="18.9">probability.</tspan></text><rect x="66" y="400" width="240" height="132" rx="18" ry="18" fill="#f4f8fb" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="66" y="400" width="240" height="10" rx="18" ry="18" fill="#123f63"/><text x="84" y="442" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="84" dy="0">Programming</tspan><tspan x="84" dy="26.4">habits</tspan></text><text x="84" y="500.4" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="400" fill="#5f7385" text-anchor="start"><tspan x="84" dy="0">Computer</tspan><tspan x="84" dy="18.9">programming, OOP,</tspan><tspan x="84" dy="18.9">debugging, problem</tspan><tspan x="84" dy="18.9">decomposition.</tspan></text><rect x="392" y="210" width="260" height="132" rx="18" ry="18" fill="#f8f1dd" stroke="#d8e0e8" stroke-width="2" filter="url(#shadow)"/><rect x="392" y="210" width="260" height="10" rx="18" ry="18" fill="#c77b33"/><text x="410" y="252" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="700" fill="#123f63" text-anchor="start"><tspan x="410" dy="0">Signals / circuits</tspan><tspan